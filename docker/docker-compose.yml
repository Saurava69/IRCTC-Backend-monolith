version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: railway-postgres
    environment:
      POSTGRES_DB: railway_booking
      POSTGRES_USER: railway
      POSTGRES_PASSWORD: railway_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U railway"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
