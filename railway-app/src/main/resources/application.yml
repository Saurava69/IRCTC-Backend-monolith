spring:
  application:
    name: railway-booking-system

  datasource:
    url: jdbc:postgresql://localhost:5432/railway_booking
    username: railway
    password: railway_pass
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc.batch_size: 25
        order_inserts: true
        order_updates: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
    consumer:
      group-id: railway-booking-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.railway.*"
        spring.json.use.type.headers: false
        spring.json.value.default.type: com.railway.common.event.EventEnvelope

server:
  port: 8080

app:
  jwt:
    secret: this-is-a-256-bit-secret-key-for-jwt-signing-change-in-prod-env
    expiration-ms: 3600000
    refresh-expiration-ms: 86400000

  booking:
    seat-lock-ttl-seconds: 600
    payment-timeout-seconds: 600
    max-passengers-per-booking: 6

  rate-limit:
    search-per-minute: 30
    booking-per-minute: 5
    pnr-check-per-minute: 20

  cache:
    availability-ttl-minutes: 5
    pnr-ttl-minutes: 15

  kafka:
    topics:
      booking-events: booking.events
      payment-events: payment.events
      notification-events: notification.events

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
